


services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1435:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - realestate-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  auctionservice:
    build:
      context: .
      dockerfile: AuctionService/Dockerfile
    container_name: auctionservice
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RealEstate;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - realestate-network

  searchservice:
    build:
      context: .
      dockerfile: SearchService/Dockerfile
    container_name: searchservice 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - AuctionServiceUrl=http://auctionservice:80
    ports:
      - "5001:80"
    depends_on:
      - auctionservice
    networks:
      - realestate-network

volumes:
  sqlserver-data:
    driver: local

networks:
  realestate-network:
    driver: bridge



